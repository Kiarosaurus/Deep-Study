server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200M;

    # Backend proxy — service name `backend` resolves through compose DNS.
    # Long timeouts match the Vite dev-proxy config: Marker extraction +
    # Gemini calls can both take minutes on first run.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;
    }

    # SPA fallback — every non-/api path serves index.html so client-side
    # router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
