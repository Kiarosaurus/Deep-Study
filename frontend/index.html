<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <!-- Apply the saved theme class synchronously, before first paint, to avoid
         a flash of the Normal theme on reload. Mirrors theme/ThemeContext. -->
    <script>
      try {
        var t = localStorage.getItem('deepstudy:theme');
        if (t === 'sepia') document.documentElement.classList.add('theme-sepia');
        else if (t === 'dark') document.documentElement.classList.add('theme-dark');
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) { /* localStorage unavailable */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
